name: Build and Release MTProxy (x86_64)

on:
  # 当推送以 v 开头的 tag 时自动触发 (例如: git tag v1.0.0 && git push origin v1.0.0)
  push:
    tags:
      - 'v*'
  # 允许在 GitHub Actions 页面手动点击运行
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest # 默认即为 x86_64 架构

    steps:
      - name: Checkout repository
        uses: actions/checkout

      - name: Install Build Dependencies
        # 对应你历史记录中的 apt install 命令
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl build-essential libssl-dev zlib1g-dev

      - name: Clone MTProxy Source
        run: git clone https://github.com/TelegramMessenger/MTProxy.git mtproxy-src

      - name: Build MTProxy
        run: |
          cd mtproxy-src
          make

      - name: Package Binary
        run: |
          mkdir -p dist
          # 将编译好的二进制文件复制出来
          cp mtproxy-src/objs/bin/mtproto-proxy dist/
          cd dist
          # 打包成 tar.gz 以保留 Linux 下的可执行权限
          tar -czvf mtproxy-linux-x86_64.tar.gz mtproto-proxy

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release
        # 只有在通过 tag 触发时才创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/mtproxy-linux-x86_64.tar.gz
          generate_release_notes: true