name: Build and Release MTProxy (x86_64)

on:
  # 当推送以 v 开头的 tag 时自动触发 (例如: git tag v1.0.0 && git push origin v1.0.0)
  push:
    tags:
      - 'v*'
  # 允许在 GitHub Actions 页面手动点击运行
  workflow_dispatch:
  # 每月 1 号的 00:00 (UTC 时间) 自动触发
  schedule:
    - cron: '0 0 1 * *' 

# 显式赋予创建 Release 和上传文件的写权限
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest # 默认即为 x86_64 架构

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set Custom Tag Name
        id: get_tag
        run: |
          # 如果是推送 tag 触发，就使用原有的 tag 名字
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            # 如果是手动或定时触发，生成北京时间（Asia/Shanghai）的“年月日时分”作为 tag
            # 格式例如：202605290630
            echo "tag_name=$(TZ='Asia/Shanghai' date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT
          fi

      - name: Install Build Dependencies
        # 对应你历史记录中的 apt install 命令
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl build-essential libssl-dev zlib1g-dev

      - name: Clone MTProxy Source
        run: git clone https://github.com/TelegramMessenger/MTProxy.git mtproxy-src

      - name: Build MTProxy
        run: |
          cd mtproxy-src
          make

      - name: Package Binary
        run: |
          mkdir -p dist
          # 将编译好的二进制文件复制出来
          cp mtproxy-src/objs/bin/mtproto-proxy dist/
          cd dist
          # 打包成 tar.gz 以保留 Linux 下的可执行权限
          tar -czvf mtproxy-linux-x86_64.tar.gz mtproto-proxy

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_tag.outputs.tag_name }} # 使用上面步骤生成的动态 Tag
          files: dist/mtproxy-linux-x86_64.tar.gz
          generate_release_notes: true